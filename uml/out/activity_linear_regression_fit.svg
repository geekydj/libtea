0.6221"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="74.3613" x="103.917" y="223.0791">d = X[0].size()</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="180.0664" x="51.0645" y="255.7158"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.0664" x="61.0645" y="278.1729">compute mean[d] across rows</text><rect fill="#F1F1F1" height="50.1875" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="185.4043" x="48.3955" y="310.8096"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="165.4043" x="58.3955" y="333.2666">compute stddev[d] across rows</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="105.375" x="58.3955" y="348.3604">(eps stabilizer 1e-8)</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="195.0781" x="43.5586" y="380.9971"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="175.0781" x="53.5586" y="403.4541">Xn = normalize(X, mean, stddev)</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="94.3789" x="93.9082" y="436.0908"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="74.3789" x="103.9082" y="458.5479">weights[d] = 0</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="62.3633" x="109.916" y="491.1846"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="42.3633" x="119.916" y="513.6416">bias = 0</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="69.0313" x="106.582" y="590.2783"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="49.0313" x="116.582" y="612.7354">dw[d] = 0</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="53.6973" x="114.249" y="645.3721"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="33.6973" x="124.249" y="667.8291">db = 0</text><rect fill="#F1F1F1" height="95.4688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="189.4238" x="46.3857" y="700.4658"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="91.377" x="56.3857" y="722.9229">for each sample i</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="169.4238" x="56.3857" y="738.0166">pred = dot(Xn[i], weights) + bias</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="89.0273" x="56.3857" y="753.1104">error = pred - y[i]</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="161.4082" x="56.3857" y="768.2041">accumulate dw += error * Xn[i]</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="124.0664" x="56.3857" y="783.2979">accumulate db += error</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="136.3672" x="72.9141" y="815.9346"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="116.3672" x="82.9141" y="838.3916">weights -= lr * (dw / n)</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="115.7012" x="83.2471" y="871.0283"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="95.7012" x="93.2471" y="893.4854">bias -= lr * (db / n)</text><polygon fill="#F1F1F1" points="141.0977,546.2783,